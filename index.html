<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vinita Enterprises</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--or:#f97316;--or2:#ea580c;--bg:#f8fafc;--wh:#fff;--tx:#1e293b;--mu:#64748b;--bd:#e2e8f0;--gr:#22c55e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.pg{display:none;min-height:100vh;flex-direction:column}
.pg.active{display:flex}
.hd{background:var(--or);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;flex-shrink:0}
.hd h2{font-size:17px;font-weight:600;flex:1}
.hd-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer}
.hd-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:13px;padding:6px 12px;border-radius:8px;cursor:pointer}
.ct{flex:1;padding:16px;max-width:520px;margin:0 auto;width:100%;overflow-y:auto}
.card{background:var(--wh);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid var(--bd)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;border:none;width:100%;transition:.15s;font-family:inherit}
.btn-or{background:var(--or);color:#fff}.btn-or:hover:not(:disabled){background:var(--or2)}
.btn-gr{background:#dcfce7;color:#166534}
.btn-wa{background:#25D366;color:#fff}
.btn-outline{background:#fff;border:1px solid var(--bd);color:var(--tx)}
.btn-sm{padding:7px 13px;font-size:13px;width:auto;border-radius:8px}
.fg{margin-bottom:14px}
label{display:block;font-size:13px;font-weight:500;color:var(--mu);margin-bottom:5px}
input,select,textarea{width:100%;padding:11px 13px;border:1px solid var(--bd);border-radius:10px;font-size:15px;background:#fff;color:var(--tx);outline:none;font-family:inherit}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500}
.b-placed{background:#fef9c3;color:#854d0e}.b-done{background:#dcfce7;color:#166534}
.b-paid{background:#dcfce7;color:#166534}.b-unpaid{background:#fee2e2;color:#991b1b}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cc{background:var(--wh);border-radius:12px;padding:18px 12px;text-align:center;cursor:pointer;border:1px solid var(--bd)}
.ci{width:52px;height:52px;background:var(--or);color:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 10px}
.pr{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--bd);gap:12px}
.p-img{width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--bd);display:flex;align-items:center;justify-content:center}
.qc{display:flex;align-items:center;gap:5px}.qb{width:28px;height:28px;border-radius:7px;border:1px solid var(--bd);background:#fff}
.qi{width:38px;text-align:center;padding:4px;border:1px solid var(--bd);border-radius:7px}
.qty-row{display:flex;gap:8px;margin-top:8px}
.qty-box{display:flex;flex-direction:column;gap:2px;background:#f8fafc;padding:6px;border-radius:6px;border:1px solid var(--bd);flex:1}
.qty-box input{padding:4px;text-align:center;font-size:13px}
.qty-box label{font-size:11px;text-align:center}
.oc{background:var(--wh);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--bd)}
.tb{display:flex;background:var(--wh);border-bottom:1px solid var(--bd);position:sticky;top:53px;z-index:9}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;color:var(--mu)}
.tab.active{color:var(--or);border-bottom:2px solid var(--or)}
.sb{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:9px 14px;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.sb input{border:none;flex:1;font-size:15px}
.land{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.ll{width:72px;height:72px;background:var(--or);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:18px}
.rcard{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:18px;cursor:pointer;display:flex;align-items:center;gap:14px;width:100%;max-width:320px;margin-bottom:12px}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;z-index:9999;display:none}
.ss-item{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:16px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.ss-av{width:40px;height:40px;background:var(--or);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.cart-bar{background:var(--or);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div id="toast"></div>

<div id="pg-landing" class="pg active">
  <div class="land">
    <div class="ll">📦</div>
    <h1 style="font-size:26px;margin-bottom:4px">Vinita Enterprises</h1>
    <p style="color:var(--mu);margin-bottom:40px">Wholesale Order Management</p>
    <div class="rcard" onclick="gotoPage('pg-salesman-select')"><span>🛵</span><div><div style="font-weight:600">Salesman</div><div style="font-size:13px;color:var(--mu)">Place & track orders</div></div></div>
    <div class="rcard" onclick="gotoPage('pg-admin-login')"><span>📊</span><div><div style="font-weight:600">Admin</div><div style="font-size:13px;color:var(--mu)">Full Control</div></div></div>
  </div>
</div>

<div id="pg-salesman-select" class="pg">
  <div class="hd"><button class="hd-back" onclick="gotoPage('pg-landing')">←</button><h2>Select Your Name</h2></div>
  <div class="ct"><div id="salesman-list"></div></div>
</div>

<div id="pg-home" class="pg">
  <div class="hd"><button class="hd-back" onclick="gotoPage('pg-landing')">←</button><h2 id="home-title">Dashboard</h2><button class="hd-btn" onclick="openNewOrder()">🛒 New Order</button></div>
  <div class="tb"><div class="tab active" onclick="switchHomeTab('catalog',this)">📦 Catalog</div><div class="tab" onclick="switchHomeTab('history',this)">📋 My Orders</div></div>
  <div id="tab-catalog" class="ct"><div id="company-grid" class="cg"></div></div>
  <div id="tab-history" class="ct" style="display:none"><div id="salesman-orders"></div></div>
</div>

<div id="pg-company" class="pg">
  <div class="hd"><button class="hd-back" onclick="gotoPage('pg-home')">←</button><h2 id="company-title">Products</h2></div>
  <div class="ct"><div class="sb"><span>🔍</span><input id="product-search" placeholder="Search..." oninput="filterCatalog()"></div><div id="product-list"></div></div>
</div>

<div id="pg-new-order" class="pg">
  <div class="hd"><button class="hd-back" onclick="gotoPage('pg-home')">←</button><h2>New Order</h2></div>
  <div class="ct">
    <div id="cart-items"></div>
    <button class="btn btn-outline" onclick="gotoPage('pg-company-picker')" style="margin-bottom:14px">+ Add Products</button>
    <div class="fg"><label>Retailer *</label><select id="f-retailer"></select></div>
    <div class="fg"><label>Payment *</label><select id="f-payment"><option value="cash">Cash</option><option value="credit">Credit</option></select></div>
    <button class="btn btn-or" id="place-btn" onclick="placeOrder()">✅ Place Order</button>
  </div>
</div>

<div id="pg-company-picker" class="pg">
  <div class="hd"><button class="hd-back" onclick="gotoPage('pg-new-order')">←</button><h2>Select Company</h2></div>
  <div class="ct"><div id="picker-company-grid" class="cg"></div></div>
</div>

<div id="pg-product-picker" class="pg">
  <div class="hd"><button class="hd-back" onclick="gotoPage('pg-company-picker')">←</button><h2 id="picker-title">Pick Products</h2></div>
  <div class="ct"><div id="picker-list"></div></div>
  <div class="cart-bar"><span id="cart-label">0 items</span><button class="btn btn-or btn-sm" onclick="gotoPage('pg-new-order')">Done ✓</button></div>
</div>

<div id="pg-admin-login" class="pg">
  <div class="hd"><button class="hd-back" onclick="gotoPage('pg-landing')">←</button><h2>Admin Login</h2></div>
  <div class="ct"><div class="card"><div class="fg"><label>Password</label><input type="password" id="admin-pw"></div><button class="btn btn-or" onclick="adminLogin()">Login</button></div></div>
</div>

<div id="pg-admin" class="pg">
  <div class="hd"><button class="hd-back" onclick="gotoPage('pg-landing')">←</button><h2>Admin Panel</h2></div>
  <div class="tb"><div class="tab active" onclick="switchAdminTab('orders',this)">Orders</div><div class="tab" onclick="switchAdminTab('manage',this)">Manage</div></div>
  <div id="at-orders" class="ct"><div id="admin-orders-list"></div></div>
  <div id="at-manage" class="ct" style="display:none"><div id="manage-content"></div></div>
</div>

<script>
const SUPABASE_URL = 'https://icboixkgnqkprljbledd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljYm9peGtnbnFrcHJsamJsZWRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTgyNzIsImV4cCI6MjA5NDA5NDI3Mn0.4dg7sy_kMU2EJlqN1qzNodPAsb2VRLJBCGVtU5cgWl4';
const FATHER_WHATSAPP = '919973478456'; 

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const S = { salesman: null, cart: [], companies: [], retailers: [] };

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function gotoPage(id) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='pg-salesman-select') loadSalesmen();
  if(id==='pg-home') loadCompanies();
  if(id==='pg-new-order') { renderCart(); loadRetailers(); }
}

// --- SALESMAN ---
async function loadSalesmen() {
  const { data, error } = await db.from('salesmen').select('*').order('name');
  if(error) return toast('Error loading salesmen');
  document.getElementById('salesman-list').innerHTML = data.map(s => `
    <div class="ss-item" onclick="selectSalesman('${s.id}','${s.name}')">
      <div class="ss-av">${s.name[0]}</div><div>${s.name}</div>
    </div>`).join('');
}

function selectSalesman(id, name) {
  S.salesman = { id, name };
  document.getElementById('home-title').textContent = name;
  gotoPage('pg-home');
}

// --- CATALOG & PICKER ---
async function loadCompanies() {
  const { data } = await db.from('companies').select('*').order('name');
  S.companies = data || [];
  const html = S.companies.map(c => `<div class="cc" onclick="openCatalog('${c.id}','${c.name}')"><div class="ci">${c.name[0]}</div><div>${c.name}</div></div>`).join('');
  document.getElementById('company-grid').innerHTML = html;
  document.getElementById('picker-company-grid').innerHTML = S.companies.map(c => `<div class="cc" onclick="openPicker('${c.id}','${c.name}')"><div class="ci">${c.name[0]}</div><div>${c.name}</div></div>`).join('');
}

async function openCatalog(id, name) {
  document.getElementById('company-title').textContent = name;
  gotoPage('pg-company');
  const { data } = await db.from('products').select('*').eq('company_id', id);
  document.getElementById('product-list').innerHTML = data.map(p => `
    <div class="pr">
      <img class="p-img" src="${p.image_url || ''}" onerror="this.src='https://via.placeholder.com/50?text=P'">
      <div><div style="font-weight:600">${p.name}</div><div style="font-size:12px;color:var(--mu)">₹${p.rate}</div></div>
    </div>`).join('');
}

async function openPicker(id, name) {
  document.getElementById('picker-title').textContent = name;
  gotoPage('pg-product-picker');
  const { data } = await db.from('products').select('*').eq('company_id', id);
  document.getElementById('picker-list').innerHTML = data.map(p => {
    const qty = S.cart.find(c => c.pid === p.id)?.qty || 0;
    return `<div class="pr">
      <div><div style="font-weight:600">${p.name}</div><div>₹${p.rate}</div></div>
      <div class="qc">
        <button class="qb" onclick="updateQty('${p.id}','${p.name}',${p.rate},-1)">-</button>
        <span id="q-${p.id}">${qty}</span>
        <button class="qb" onclick="updateQty('${p.id}','${p.name}',${p.rate},1)">+</button>
      </div>
    </div>`;
  }).join('');
}

function updateQty(pid, name, rate, delta) {
  let item = S.cart.find(c => c.pid === pid);
  if(!item) { item = { pid, name, rate, qty: 0, bonus: 0 }; S.cart.push(item); }
  item.qty = Math.max(0, item.qty + delta);
  document.getElementById('q-'+pid).textContent = item.qty;
  document.getElementById('cart-label').textContent = S.cart.reduce((a,b)=>a+b.qty,0) + ' items';
}

// --- ORDERING ---
async function loadRetailers() {
  const { data } = await db.from('retailers').select('*').order('name');
  document.getElementById('f-retailer').innerHTML = data.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
}

function renderCart() {
  document.getElementById('cart-items').innerHTML = S.cart.filter(c=>c.qty>0).map(item => `
    <div class="card">
      <div style="font-weight:600">${item.name}</div>
      <div class="qty-row">
        <div class="qty-box"><label>Qty</label><input type="number" value="${item.qty}" onchange="S.cart.find(i=>i.pid==='${item.pid}').qty=parseInt(this.value);renderCart()"></div>
        <div class="qty-box"><label>Bonus</label><input type="number" value="${item.bonus}" onchange="S.cart.find(i=>i.pid==='${item.pid}').bonus=parseInt(this.value)"></div>
        <div class="qty-box"><label>Rate</label><input type="number" value="${item.rate}" onchange="S.cart.find(i=>i.pid==='${item.pid}').rate=parseFloat(this.value)"></div>
      </div>
    </div>`).join('');
}

async function placeOrder() {
  const items = S.cart.filter(c=>c.qty>0);
  if(!items.length) return toast('Cart is empty');
  
  const btn = document.getElementById('place-btn');
  btn.disabled = true; btn.textContent = 'Processing...';

  const { data: ord, error } = await db.from('orders').insert({
    salesman_id: S.salesman.id,
    retailer_id: document.getElementById('f-retailer').value,
    payment_term: document.getElementById('f-payment').value
  }).select().single();

  if(error) { toast('Error: ' + error.message); btn.disabled = false; return; }

  await db.from('order_items').insert(items.map(i => ({
    order_id: ord.id, product_id: i.pid, quantity: i.qty, bonus_quantity: i.bonus, rate: i.rate
  })));

  toast('✅ Order Placed!');
  S.cart = [];
  gotoPage('pg-home');
}

// --- ADMIN & MANAGE ---
function adminLogin() {
  if(document.getElementById('admin-pw').value === 'admin123') gotoPage('pg-admin'), loadManage();
  else toast('Wrong password');
}

function loadManage() {
  document.getElementById('manage-content').innerHTML = `
    <div class="card"><h3>Add Salesman</h3><div class="fg"><input id="m-sn" placeholder="Name"></div><button class="btn btn-or" onclick="addSalesman()">Add</button></div>
    <div class="card"><h3>Add Company</h3><div class="fg"><input id="m-cn" placeholder="Company Name"></div><button class="btn btn-or" onclick="addCompany()">Add</button></div>
    <div class="card"><h3>Add Product</h3>
      <select id="m-pc" style="margin-bottom:10px"></select>
      <input id="m-pn" placeholder="Product Name" style="margin-bottom:10px">
      <input id="m-pr" type="number" placeholder="Rate" style="margin-bottom:10px">
      <input type="file" accept="image/*" onchange="handleImg(this)" style="margin-bottom:10px">
      <input type="hidden" id="m-pimg">
      <button class="btn btn-or" onclick="addProduct()">Add Product</button>
    </div>`;
  db.from('companies').select('*').then(({data}) => {
    document.getElementById('m-pc').innerHTML = data.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  });
}

async function addSalesman() {
  const n = document.getElementById('m-sn').value.trim();
  if(!n) return toast('Enter name');
  const { error } = await db.from('salesmen').insert({ name: n });
  if(error) toast('❌ ' + error.message);
  else toast('✅ Added'), document.getElementById('m-sn').value = '';
}

async function addCompany() {
  const n = document.getElementById('m-cn').value.trim();
  const { error } = await db.from('companies').insert({ name: n });
  if(error) toast('❌ ' + error.message);
  else toast('✅ Added'), document.getElementById('m-cn').value = '';
}

async function addProduct() {
  const { error } = await db.from('products').insert({
    company_id: document.getElementById('m-pc').value,
    name: document.getElementById('m-pn').value,
    rate: document.getElementById('m-pr').value,
    image_url: document.getElementById('m-pimg').value
  });
  if(error) toast('❌ ' + error.message);
  else toast('✅ Added');
}

function handleImg(input) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 200; canvas.height = 200;
      canvas.getContext('2d').drawImage(img, 0, 0, 200, 200);
      document.getElementById('m-pimg').value = canvas.toDataURL('image/jpeg', 0.6);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function openNewOrder() { S.cart = []; gotoPage('pg-new-order'); }
function switchHomeTab(t, e) {
  document.querySelectorAll('#pg-home .tab').forEach(x=>x.classList.remove('active'));
  e.classList.add('active');
  document.getElementById('tab-catalog').style.display = t==='catalog'?'block':'none';
  document.getElementById('tab-history').style.display = t==='history'?'block':'none';
}
function switchAdminTab(t, e) {
  document.querySelectorAll('#pg-admin .tab').forEach(x=>x.classList.remove('active'));
  e.classList.add('active');
  document.getElementById('at-orders').style.display = t==='orders'?'block':'none';
  document.getElementById('at-manage').style.display = t==='manage'?'block':'none';
}
</script>
</body>
</html>
